<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flipbook English</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
  <style>
    :root {
      --bg: #eef2f7;
      --panel: rgba(255,255,255,0.92);
      --ink: #17324f;
      --muted: #6b7a8c;
      --accent: #224f7b;
      --line: rgba(23,50,79,0.12);
      --shadow: 0 18px 60px rgba(20, 40, 70, 0.16);
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(34,79,123,0.12), transparent 30%),
        radial-gradient(circle at bottom right, rgba(34,79,123,0.10), transparent 30%),
        var(--bg);
      min-height: 100vh;
    }
    .shell { max-width: 1500px; margin: 0 auto; padding: 28px; }
    .topbar {
      display: flex; gap: 16px; flex-wrap: wrap; align-items: center; justify-content: space-between;
      background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
      padding: 18px 20px; box-shadow: var(--shadow); backdrop-filter: blur(10px);
    }
    .brand h1 {
      margin: 0; font-size: clamp(1.2rem, 1.2vw + 1rem, 1.8rem);
      font-family: "Playfair Display", serif; letter-spacing: 0.02em;
    }
    .brand p { margin: 6px 0 0; color: var(--muted); font-size: 0.95rem; }
    .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    button, .button-link {
      appearance: none; border: 0; background: white; color: var(--ink);
      padding: 11px 16px; border-radius: 999px; font: inherit; font-weight: 600; cursor: pointer;
      box-shadow: 0 4px 18px rgba(23, 50, 79, 0.08); text-decoration: none;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }
    button:hover, .button-link:hover {
      transform: translateY(-1px); box-shadow: 0 8px 24px rgba(23, 50, 79, 0.12); background: #f8fbff;
    }
    .button-primary { background: var(--accent); color: white; }
    .button-primary:hover { background: #1d456b; }
    .layout {
      margin-top: 22px; display: grid; grid-template-columns: 280px minmax(0, 1fr);
      gap: 22px; align-items: start;
    }
    .panel {
      background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
      box-shadow: var(--shadow); backdrop-filter: blur(10px);
    }
    .sidebar { padding: 18px; position: sticky; top: 24px; max-height: calc(100vh - 56px); overflow: auto; }
    .sidebar h2 { margin: 4px 0 6px; font-size: 1rem; }
    .sidebar p { margin: 0 0 18px; color: var(--muted); font-size: 0.92rem; line-height: 1.45; }
    .thumbs { display: grid; gap: 12px; }
    .thumb {
      width: 100%; border: 1px solid transparent; border-radius: 16px; overflow: hidden;
      background: white; padding: 8px; box-shadow: 0 4px 14px rgba(23, 50, 79, 0.06); cursor: pointer;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }
    .thumb:hover { transform: translateY(-2px); }
    .thumb.active { border-color: rgba(34,79,123,0.28); }
    .thumb img { display: block; width: 100%; height: auto; border-radius: 10px; }
    .thumb span { display: block; padding-top: 8px; font-size: 0.9rem; color: var(--muted); text-align: center; }
    .viewer { padding: 20px; }
    .stage {
      min-height: 78vh; display: flex; align-items: center; justify-content: center; padding: 12px;
      background: linear-gradient(135deg, #f7f9fc, #edf2f8); border-radius: 20px;
    }
    #flipbook { width: min(100%, 1000px); height: min(78vh, 1100px); margin: 0 auto; }
    .page { background: transparent; display: flex; align-items: center; justify-content: center; }
    .page-inner {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 12px;
      background: white; border-radius: 18px; overflow: hidden; box-shadow: 0 18px 44px rgba(23, 50, 79, 0.14);
    }
    .page img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; border-radius: 10px; }
    .meta {
      margin-top: 16px; display: flex; gap: 12px; align-items: center; justify-content: space-between; flex-wrap: wrap;
    }
    .hint { color: var(--muted); font-size: 0.94rem; }
    .counter { font-weight: 700; }
    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: static; max-height: none; }
      #flipbook { height: 70vh; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="brand">
        <h1>Flipbook English</h1>
        <p>Interactive PDF with page-turn sound and loop back to page 1 from the last page</p>
      </div>
      <div class="controls">
        <button id="prevBtn">← Previous</button>
        <button id="nextBtn" class="button-primary">Next →</button>
        <button id="soundBtn">Sound: On</button>
        <button id="fullscreenBtn">Fullscreen</button>
        <a class="button-link" href="Wellcome_english.pdf" download>Download PDF</a>
      </div>
    </div>

    <div class="layout">
      <aside class="panel sidebar">
        <h2>Pages</h2>
        <p>Click a thumbnail to jump to any page.</p>
        <div class="thumbs" id="thumbs"></div>
      </aside>

      <main class="panel viewer">
        <div class="stage">
          <div id="flipbook"></div>
        </div>
        <div class="meta">
          <div class="hint">On the last page, pressing “Next” takes you back to page 1.</div>
          <div class="counter" id="counter">Page 1 / 11</div>
        </div>
      </main>
    </div>
  </div>

  <script>
    const pagePaths = ['pages/page-1.png', 'pages/page-2.png', 'pages/page-3.png', 'pages/page-4.png', 'pages/page-5.png', 'pages/page-6.png', 'pages/page-7.png', 'pages/page-8.png', 'pages/page-9.png', 'pages/page-10.png', 'pages/page-11.png'];
    const flipbookEl = document.getElementById('flipbook');
    const thumbsEl = document.getElementById('thumbs');
    const counterEl = document.getElementById('counter');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const soundBtn = document.getElementById('soundBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');

    let pageFlip;
    let soundEnabled = true;
    const flipAudio = new Audio('page-flip.mp3');
    flipAudio.preload = 'auto';

    function ensureAudio() {
      try {
        flipAudio.load();
      } catch (e) {}
    }

    function playPageTurnSound() {
      if (!soundEnabled) return;
      try {
        flipAudio.pause();
        flipAudio.currentTime = 0;
        flipAudio.play().catch(() => {});
      } catch (e) {}
    }

    function makePage(src, index) {
      const page = document.createElement('div');
      page.className = 'page';
      const inner = document.createElement('div');
      inner.className = 'page-inner';
      const img = document.createElement('img');
      img.src = src;
      img.alt = `Page ${index + 1}`;
      inner.appendChild(img);
      page.appendChild(inner);
      return page;
    }

    function buildThumbs() {
      pagePaths.forEach((src, index) => {
        const btn = document.createElement('button');
        btn.className = 'thumb' + (index === 0 ? ' active' : '');
        btn.type = 'button';
        btn.innerHTML = `<img src="${src}" alt="Thumbnail page ${index + 1}"><span>Page ${index + 1}</span>`;
        btn.addEventListener('click', () => {
          if (pageFlip) pageFlip.flip(index);
        });
        thumbsEl.appendChild(btn);
      });
    }

    function updateUI() {
      if (!pageFlip) return;
      const current = pageFlip.getCurrentPageIndex() + 1;
      counterEl.textContent = `Page ${current} / 11`;
      document.querySelectorAll('.thumb').forEach((thumb, i) => {
        thumb.classList.toggle('active', i === current - 1);
      });
    }

    function goNextLoop() {
      if (!pageFlip) return;
      const currentIndex = pageFlip.getCurrentPageIndex();
      const lastIndex = pagePaths.length - 1;
      if (currentIndex >= lastIndex) {
        pageFlip.flip(0);
      } else {
        pageFlip.flipNext();
      }
    }

    function init() {
      buildThumbs();

      pageFlip = new St.PageFlip(flipbookEl, {
        width: 700,
        height: 990,
        size: 'stretch',
        minWidth: 315,
        maxWidth: 1000,
        minHeight: 446,
        maxHeight: 1414,
        showCover: true,
        usePortrait: true,
        mobileScrollSupport: false,
        flippingTime: 850,
        drawShadow: true,
        maxShadowOpacity: 0.22,
        autoSize: true
      });

      const pages = pagePaths.map((src, i) => makePage(src, i));
      pageFlip.loadFromHTML(pages);
      updateUI();

      pageFlip.on('flip', () => {
        updateUI();
        playPageTurnSound();
      });

      prevBtn.addEventListener('click', () => {
        ensureAudio();
        if (pageFlip) pageFlip.flipPrev();
      });

      nextBtn.addEventListener('click', () => {
        ensureAudio();
        goNextLoop();
      });

      soundBtn.addEventListener('click', () => {
        soundEnabled = !soundEnabled;
        soundBtn.textContent = soundEnabled ? 'Sound: On' : 'Sound: Off';
        ensureAudio();
      });

      fullscreenBtn.addEventListener('click', async () => {
        const docEl = document.documentElement;
        if (!document.fullscreenElement) {
          if (docEl.requestFullscreen) await docEl.requestFullscreen();
        } else {
          if (document.exitFullscreen) await document.exitFullscreen();
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') {
          ensureAudio();
          if (pageFlip) pageFlip.flipPrev();
        }
        if (e.key === 'ArrowRight') {
          ensureAudio();
          goNextLoop();
        }
      });

      document.addEventListener('pointerdown', ensureAudio, { once: true });
    }

    init();
  </script>
</body>
</html>
